      - CLI_ID=3
      - NOMBRE=cliente
      - APELLIDO=3
      - DOCUMENTO=3
      - NACIMIENTO=1990-01-01
      - NUMERO=3
      - DATASET_PATH=/data/agency-3.csv
    networks:
      - testing_net
    volumes:
      - ./client/config.yaml:/config.yaml:ro
      - ./.data:/data:ro
    depends_on:
      - server

  client4:
    container_name: client4
    image: client:latest
    entrypoint: /client
    environment:
      - CLI_ID=4
      - NOMBRE=cliente
      - APELLIDO=4
      - DOCUMENTO=4
      - NACIMIENTO=1990-01-01
      - NUMERO=4
      - DATASET_PATH=/data/agency-4.csv
    networks:
      - testing_net
    volumes:
      - ./client/config.yaml:/config.yaml:ro
      - ./.data:/data:ro
    depends_on:
      - server

  client5:
    container_name: client5
